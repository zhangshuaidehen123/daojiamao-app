name: 编译APK

on:
  push:
    branches: [ 主要角色 ]
  workflow_dispatch:

jobs:
  build:
    name: 编译Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 安装JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 缓存Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: 设置Gradle权限
        run: chmod +x gradlew

      - name: 编译Debug APK
        run: ./gradlew assembleDebug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: daojia-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
